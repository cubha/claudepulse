<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Gauge track (full semicircle, dim) -->
  <path d="M2 12 A6 6 0 0 1 14 12"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round" opacity="0.3"/>
  <!-- Active arc (~60%, same direction) -->
  <path d="M2 12 A6 6 0 0 1 9.85 6.3"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round"/>
  <!-- Needle from center toward 60% mark -->
  <line x1="8" y1="12" x2="10" y2="6.5"
        stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="8" cy="12" r="1.3" fill="currentColor"/>
</svg>
