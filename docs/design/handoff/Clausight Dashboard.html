<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clausight — VS Code Usage Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Codicons (icon font shipped with VS Code) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.36/dist/codicon.css"
  />

  <link rel="stylesheet" href="styles.css" />

  <style>
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f0eee9;
    }
    /* Make codicons render at the size we ask for, not their default 16px */
    .codicon { font-size: inherit !important; line-height: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"
  ></script>

  <!-- Design canvas wrapper + screen modules -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="screen-statusbar.jsx"></script>
  <script type="text/babel" src="screen-sidebar.jsx"></script>
  <script type="text/babel" src="screen-overview.jsx"></script>
  <script type="text/babel" src="screen-sessions.jsx"></script>
  <script type="text/babel" src="screen-tokens.jsx"></script>

  <!-- App: lay out the artboards -->
  <script type="text/babel">
    const App = () => (
      <DesignCanvas
        title="Clausight"
        subtitle="VS Code · Claude Code Usage Dashboard"
      >
        <DCSection
          id="layer1"
          title="Layer 1 · StatusBar"
          subtitle="Always visible, single line — hover for tooltip, click to open the panel."
        >
          <DCArtboard id="statusbar-zoom" label="StatusBar slice · 720 × 320 · dark" width={720} height={320}>
            <StatusBarScreen />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="layer2"
          title="Layer 2 · Sidebar Webview View"
          subtitle="Left activity bar → 280px panel. At-a-glance only. Two themes, identical layout."
        >
          <DCArtboard id="sidebar-dark" label="Sidebar · Dark" width={280} height={620}>
            <Sidebar theme="dark" />
          </DCArtboard>
          <DCArtboard id="sidebar-light" label="Sidebar · Light" width={280} height={620}>
            <Sidebar theme="light" />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="layer3"
          title="Layer 3 · Webview Panel"
          subtitle="Editor tab. Left vertical nav: Overview · Charts · Heatmap · Sessions · Settings. Two tabs designed."
        >
          <DCArtboard id="panel-overview" label="Panel · Overview · Dark" width={1280} height={800}>
            <PanelOverview />
          </DCArtboard>
          <DCArtboard id="panel-sessions" label="Panel · Sessions · Dark" width={1280} height={800}>
            <PanelSessions />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="tokens"
          title="Foundations"
          subtitle="Theme tokens, accents, type, spacing, components — one source of truth."
        >
          <DCArtboard id="design-tokens" label="Design tokens" width={1280} height={1640}>
            <TokensScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
