<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1100px; height:680px; overflow:hidden; background:#1e1e1e; font-family:-apple-system,sans-serif; }

  .vscode-chrome {
    display:flex; flex-direction:column; width:1100px; height:680px;
  }

  /* Title bar */
  .title-bar {
    height:30px; background:#3c3c3c; display:flex; align-items:center;
    padding:0 12px; gap:8px; flex-shrink:0; border-bottom:1px solid #252525;
  }
  .title-bar-dots { display:flex; gap:5px; }
  .dot { width:12px; height:12px; border-radius:50%; }
  .dot.red   { background:#ff5f56; }
  .dot.yellow{ background:#ffbd2e; }
  .dot.green { background:#27c93f; }
  .title-text { color:#ccc; font-size:12px; flex:1; text-align:center; }

  /* Tab bar */
  .tab-bar {
    height:35px; background:#252526; display:flex; align-items:flex-end;
    padding-left:300px; flex-shrink:0; border-bottom:1px solid #1a1a1a;
  }
  .tab {
    height:35px; padding:0 14px; display:flex; align-items:center; gap:6px;
    font-size:12px; color:#999; background:#2d2d2d; border-right:1px solid #1a1a1a;
    border-top:1px solid #1a1a1a;
  }
  .tab.active { color:#ccc; background:#1e1e1e; border-top:1px solid #4daafc; }
  .tab-icon { font-size:14px; }
  .tab-x { color:#666; font-size:11px; margin-left:4px; }

  /* Main area */
  .main-area { display:flex; flex:1; overflow:hidden; }

  /* Activity bar */
  .activity-bar {
    width:48px; background:#333; display:flex; flex-direction:column;
    align-items:center; padding:8px 0; gap:2px; flex-shrink:0;
    border-right:1px solid #252525;
  }
  .ab-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:4px; cursor:pointer; color:#bbb; }
  .ab-icon.active { color:#fff; border-left:2px solid #fff; background:rgba(255,255,255,.07); }
  .ab-icon svg { width:22px; height:22px; }

  /* Sidebar panel */
  .sidebar-wrap {
    width:300px; flex-shrink:0; display:flex; flex-direction:column;
    background:#252526; border-right:1px solid #3c3c3c;
  }
  .sidebar-section-title {
    font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:#bbb; padding:8px 12px 6px; border-bottom:1px solid #3c3c3c;
    background:#252526; flex-shrink:0;
  }
  .sidebar-frame { flex:1; border:none; width:300px; overflow:hidden; }

  /* Dashboard area */
  .dashboard-wrap { flex:1; display:flex; flex-direction:column; background:#1e1e1e; overflow:hidden; }
  .dashboard-frame { flex:1; border:none; width:100%; }

  /* Status bar */
  .status-bar {
    height:22px; background:#007acc; display:flex; align-items:center;
    padding:0 10px; gap:12px; flex-shrink:0;
  }
  .status-item { font-size:11px; color:rgba(255,255,255,.9); display:flex; align-items:center; gap:4px; }
  .status-item.right { margin-left:auto; }
</style>
</head>
<body>
<div class="vscode-chrome">
  <!-- Title bar -->
  <div class="title-bar">
    <div class="title-bar-dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="title-text">claudepulse — Visual Studio Code</div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active">
      <span class="tab-icon">⊞</span>
      Claude Code Gauge Dashboard
      <span class="tab-x">×</span>
    </div>
  </div>

  <div class="main-area">
    <!-- Activity bar -->
    <div class="activity-bar">
      <div class="ab-icon" title="Explorer">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
      </div>
      <div class="ab-icon" title="Search">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <div class="ab-icon active" title="Claude Code Gauge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
          <path d="M2 12 A6 6 0 0 1 14 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
          <path d="M2 12 A6 6 0 0 1 9.85 6.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="12" x2="10" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="12" r="1.3" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-wrap">
      <div class="sidebar-section-title">Claude Code Gauge</div>
      <iframe class="sidebar-frame" id="sb-frame" src="sidebar.html" height="617" scrolling="no"></iframe>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-wrap">
      <iframe class="dashboard-frame" id="panel-frame" src="panel.html" height="610" scrolling="no"></iframe>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-item">⎇ main</span>
    <span class="status-item">claudepulse</span>
    <span class="status-item right">5H 🟨🟨⬜⬜⬜ 36%</span>
    <span class="status-item">7D 🟦🟦⬜⬜⬜ 26%</span>
    <span class="status-item">UTF-8</span>
    <span class="status-item">TypeScript</span>
  </div>
</div>
</body>
</html>
